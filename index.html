<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Alvarez Roman Heritage Equestrian</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #141612;
      display: flex;
      justify-content: center;
      align-items: center; 
      padding: 40px 20px;
      overflow-x: hidden;
    }

    .glass-card {
      width: 380px;
      padding: 45px 35px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(197, 160, 89, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      color: #fdfaf6;
      text-align: center;
      margin: auto;
    }

    .logo-img {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      border: 2px solid #c5a059;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
    }

    h2 {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #c5a059;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin-bottom: 28px;
      color: #b5aba1;
      font-size: 14px;
      font-weight: 300;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 18px;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #fdfaf6;
      font-size: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field::placeholder {
      color: #8c857d;
    }

    .input-field:focus {
      border-color: #c5a059;
      background: rgba(0, 0, 0, 0.5);
    }

    .eye-icon {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #8c857d;
      cursor: pointer;
      font-size: 16px;
      transition: color 0.2s;
    }

    .eye-icon:hover {
      color: #c5a059;
    }

    .error {
      font-size: 12px;
      color: #ff6b6b;
      margin-top: -12px;
      margin-bottom: 12px;
      text-align: left;
      padding-left: 5px;
      min-height: 14px;
    }

    .primary-btn, .oauth-btn, .guest-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
    }

    .primary-btn {
      background: #4a3b32;
      color: white;
      border: 1px solid #5c4a3f;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .primary-btn:hover:not(:disabled) {
      background: #c5a059;
      color: #141612;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(197, 160, 89, 0.2);
    }

    .primary-btn:disabled {
        background: #2a2a2a;
        color: #666;
        border-color: #333;
        cursor: not-allowed;
    }

    .oauth-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #fdfaf6;
      border: 1px solid rgba(255, 255, 255, 0.15);
      justify-content: space-between;
      padding: 14px 20px;
    }

    .oauth-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .guest-btn {
      background: transparent;
      color: #c5a059;
      border: 1px solid rgba(197, 160, 89, 0.5);
      margin-top: -5px; 
    }

    .guest-btn:hover {
      background: rgba(197, 160, 89, 0.1);
      border-color: #c5a059;
    }

    .oauth-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .oauth-logo {
      width: 18px;
      height: 18px;
    }

    .strength {
      height: 4px;
      border-radius: 2px;
      margin-top: 5px;
      margin-bottom: 15px;
      transition: 0.3s ease;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
    }

    .terms-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 15px 0 5px 0;
      text-align: left;
    }

    .terms-label {
      font-size: 11px;
      color: #b5aba1;
      line-height: 1.4;
      cursor: pointer;
    }

    .terms-label a {
      color: #c5a059;
      text-decoration: none;
    }

    .custom-checkbox {
      accent-color: #c5a059;
      cursor: pointer;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .bottom-text {
      margin-top: 25px;
      font-size: 13px;
      color: #b5aba1;
    }

    .bottom-text a {
      color: #c5a059;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
    }

    .bottom-text a:hover {
      color: #e6c885;
      text-decoration: underline;
    }

    #signup-section {
      display: none;
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 20px; }
      .glass-card { width: 100%; max-width: 400px; padding: 30px 20px; }
      h2 { font-size: 24px; }
      .logo-img { width: 70px; height: 70px; }
      .input-field { font-size: 16px; }
    }
  </style>
</head>

<body>

  <div class="glass-card">
    <img src="images/logo.png" alt="Alvarez Roman Heritage Logo" class="logo-img" />

    <form id="login-section" onsubmit="login(event)" novalidate>
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your credentials to continue.</p>

      <div class="input-wrapper">
        <input id="login-email" type="email" class="input-field" placeholder="Email Address" />
      </div>

      <div class="input-wrapper">
        <input id="login-password" type="password" class="input-field" placeholder="Password" />
        <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('login-password', this)"></i>
      </div>

      <p id="login-error" class="error"></p>

      <button type="submit" id="signin-btn" class="primary-btn">
        <span id="signin-text">Sign In</span>
        <i id="signin-spinner" class="fas fa-spinner fa-spin" style="display: none; margin-left: 10px;"></i>
      </button>

      <div class="oauth-btn" onclick="googleLogin()">
        <div class="oauth-left">
          <img src="https://developers.google.com/identity/images/g-logo.png" class="oauth-logo">
          <span>Continue with Google</span>
        </div>
        <i class="fa-solid fa-chevron-right" style="font-size: 12px; color: #b5aba1;"></i>
      </div>

      <button type="button" class="guest-btn" onclick="continueAsGuest()">Continue as Guest</button>

      <div class="bottom-text">
        Don't have an account? <a onclick="showSignup()">Create Account</a>
      </div>
    </form>

    <form id="signup-section" onsubmit="signup(event)" novalidate>
      <h2>Create Account</h2>
      <p class="subtitle">Join our equestrian heritage</p>

      <div class="input-wrapper">
        <input id="signup-name" type="text" class="input-field" placeholder="Full Name" />
      </div>
      <p id="name-error" class="error"></p>

      <div class="input-wrapper">
        <input id="signup-email" type="email" class="input-field" placeholder="Email Address" />
      </div>
      <p id="signup-email-error" class="error"></p>

      <div class="input-wrapper">
        <input id="signup-username" type="text" class="input-field" placeholder="Username" />
      </div>
      <p id="username-error" class="error"></p>

      <div class="input-wrapper">
        <input id="signup-password" type="password" class="input-field" placeholder="Password" oninput="checkStrength()" />
        <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('signup-password', this)"></i>
      </div>

      <div id="strength-bar" class="strength"></div>
      <p id="signup-pass-error" class="error"></p>

      <div class="input-wrapper">
        <input id="signup-confirm" type="password" class="input-field" placeholder="Confirm Password" />
        <i class="fa-solid fa-eye eye-icon" onclick="togglePassword('signup-confirm', this)"></i>
      </div>
      <p id="signup-confirm-error" class="error"></p>

      <div class="terms-wrapper">
        <input type="checkbox" id="terms-check" class="custom-checkbox">
        <label for="terms-check" class="terms-label">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>
      <p id="terms-error" class="error"></p>

      <button type="submit" id="signup-btn" class="primary-btn">Register</button>

      <div class="bottom-text">
        Already have an account? <a onclick="showLogin()">Login</a>
      </div>
    </form>
  </div>

  <script>
    const API_BASE_URL = "https://login-backend-ny6x.onrender.com";

    function continueAsGuest() {
      localStorage.setItem("guest", "true");
      window.location.href = "dashboard.html";
    }

    function googleLogin() {
      const clientID = "1087470069021-e2qidvg3niahbg4cguq1uuj3f291nj5m.apps.googleusercontent.com";
      const redirect = `${API_BASE_URL}/google-callback`;
      const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=code&scope=openid%20email%20profile&prompt=select_account`;
      window.location.href = url;
    }

    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      }
    }

    async function login(event) {
      event.preventDefault();
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const errorBox = document.getElementById("login-error");
      const signinBtn = document.getElementById("signin-btn");
      const signinText = document.getElementById("signin-text");
      const signinSpinner = document.getElementById("signin-spinner");

      if (!email || !password) {
        errorBox.innerText = "Please enter both email and password";
        return;
      }

      signinBtn.disabled = true;
      signinText.innerText = "Signing in...";
      signinSpinner.style.display = "inline-block";
      errorBox.innerText = "";

      try {
        const res = await fetch(`${API_BASE_URL}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || "Login failed");

        localStorage.removeItem("guest");
        localStorage.setItem("token", data.token);
        window.location.href = "dashboard.html";
      } catch (error) {
        signinBtn.disabled = false;
        signinText.innerText = "Sign In";
        signinSpinner.style.display = "none";
        errorBox.innerText = error.message;
      }
    }

    function checkStrength() {
      const pass = document.getElementById("signup-password").value;
      const bar = document.getElementById("strength-bar");
      let strength = 0;
      if (pass.length >= 8) strength++;
      if (/[A-Z]/.test(pass)) strength++;
      if (/[a-z]/.test(pass)) strength++;
      if (/[0-9]/.test(pass)) strength++;
      if (/[^A-Za-z0-9]/.test(pass)) strength++;
      const colors = ["#ff4d4d", "#ff884d", "#ffee4d", "#7fff4d", "#00e600"];
      bar.style.background = colors[strength - 1] || "rgba(255,255,255,0.15)";
    }

    async function signup(event) {
      event.preventDefault();
      const fullName = document.getElementById("signup-name").value;
      const email = document.getElementById("signup-email").value;
      const username = document.getElementById("signup-username").value;
      const password = document.getElementById("signup-password").value;
      const confirm = document.getElementById("signup-confirm").value;
      const termsCheck = document.getElementById("terms-check");
      const signupBtn = document.getElementById("signup-btn");

      if (password !== confirm) {
        document.getElementById("signup-confirm-error").innerText = "Passwords do not match";
        return;
      }
      if (!termsCheck.checked) {
        document.getElementById("terms-error").innerText = "You must agree to the terms";
        return;
      }

      signupBtn.disabled = true;
      signupBtn.innerText = "Creating Account...";

      try {
        const res = await fetch(`${API_BASE_URL}/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ fullName, email, username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("signup-email-error").innerText = data.message;
          signupBtn.disabled = false;
          signupBtn.innerText = "Register";
        } else {
          let token = data.token;
          if (token) {
            localStorage.removeItem("guest");
            localStorage.setItem("token", token);
            signupBtn.innerText = "Welcome! Redirecting...";
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
          } else {
            window.location.href = "index.html";
          }
        }
      } catch (error) {
        alert("Network error. Please try again.");
        signupBtn.disabled = false;
        signupBtn.innerText = "Register";
      }
    }

    function showSignup() {
      document.getElementById("login-section").style.display = "none";
      document.getElementById("signup-section").style.display = "block";
    }
    function showLogin() {
      document.getElementById("signup-section").style.display = "none";
      document.getElementById("login-section").style.display = "block";
    }
  </script>
</body>
</html>
