<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <link rel="icon" href="Pictures/Signinpage/Logoq.PNG" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      width: 100%;
      background: #1e1e2f;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .loading-screen {
      position: relative;
      height: 100vh;
      width: 100vw;
    }

    .logo {
  width: 100px;
  height: 100px;
  background: url('pictures/Signinpage/Logoq.PNG') no-repeat center center;
  background-size: cover;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: all 1s ease;

  /* Add this to make it circular */
  border-radius: 50%;
  overflow: hidden;
}

    .name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 2rem;
      opacity: 0;
      white-space: nowrap;
      transition: opacity 1s ease;
    }

    .subtext {
      position: absolute;
      top: calc(50% + 50px); /* adjusted slightly for the larger text */
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-weight: bold;
      font-size: 1.8rem; /* Increased the font size here */
      opacity: 0;
      transition: opacity 1s ease;
    }

    .loaded .logo {
      left: 35%;
      transform: translate(-50%, -50%);
    }

    .loaded .name {
      left: 60%;
      opacity: 1;
    }

    .loaded .subtext {
      opacity: 1;
      left: 60%;
    }

    @media (max-width: 600px) {
      .name {
        font-size: 1.2rem;
      }
      .subtext {
        font-size: 1.5rem; /* Adjusted for mobile */
      }
    }

    /* Styling for the dots at the bottom center */
    .dots {
      position: absolute;
      bottom: 180px; /* Moved the dots higher by adjusting this value */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 10px; /* Space between dots */
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: white;
      opacity: 0;
      animation: dotAnimation 1.5s infinite ease-in-out;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }

    .dot:nth-child(2) {
      animation-delay: 0.3s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.6s;
    }

    @keyframes dotAnimation {
      0%, 100% {
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
    }

 
    .loaded .dots .dot {
      opacity: 1;
    }

    .name {
        color: white;
    }

    .subtext {
        color: white;
    }
    
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="logo"></div>
    <div class="name">Alvarez - Roman Heritage Equestrian</div>
    <div class="subtext">News!</div>

    <!-- Three dots at the bottom center -->
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");
  const subtextEl = document.querySelector(".subtext");

  if (type === "events") {
    subtextEl.textContent = "Events!";
  } else {
    subtextEl.textContent = "News!"; // default
  }

  // Simulate loading time
  setTimeout(() => {
    document.getElementById("loadingScreen").classList.add("loaded");

    // After the animation, redirect to the new page
    setTimeout(() => {
      if (type === "events") {
        window.location.href = "Events.html"; // Change to your actual events page
      } else {
        window.location.href = "Newspage.html";
      }
    }, 2000);
  }, 1000);
});
  </script>

</body>
</html>
