<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Project Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1a1c1e; }
        .dark-card { background-color: #2f3136; }
        .dark-input { background-color: #202225; border-color: #2f3136; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-center items-center px-4">

    <main class="w-full max-w-2xl py-10">
        <a href="dashboard.html" class="text-sm text-gray-400 hover:text-white mb-4 inline-flex items-center">&larr; Back to Dashboard</a>
        <div class="dark-card p-8 rounded-xl border border-gray-800 shadow-xl">
            <h2 class="text-2xl font-bold text-white mb-2">Request Technical Help</h2>
            <p class="text-gray-400 text-sm mb-6">Stuck on an engine bug or compile configuration? Send details straight to our technical leads.</p>
            
            <form onsubmit="handleHelpSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Problem Subject / Title</label>
                    <input type="text" id="help-subject" placeholder="e.g., Database connection timeout on container runtime" required class="w-full dark-input rounded-md bg-[#202225] border border-gray-700 p-2.5 text-white focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Detailed Error Description</label>
                    <textarea id="help-desc" rows="4" placeholder="Explain what went wrong, what you expected, and steps to reproduce..." required class="w-full dark-input rounded-md bg-[#202225] border border-gray-700 p-2.5 text-white focus:outline-none focus:border-blue-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Code Snippet / Log Output</label>
                    <textarea id="help-code" rows="4" placeholder="Paste relevant debug logs or stack traces here..." class="w-full font-mono text-xs dark-input rounded-md bg-[#202225] border border-gray-700 p-2.5 text-emerald-400 focus:outline-none focus:border-blue-500"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white p-3 rounded-md font-semibold transition mt-2 shadow-lg flex items-center justify-center space-x-2">
                    <span id="btn-text">Submit Help Ticket</span>
                    <div id="btn-spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>
        </div>
    </main>

    <script>
        function handleHelpSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');

            btn.disabled = true;
            btnText.innerText = "Generating Ticket...";
            btnSpinner.classList.remove('hidden');

            const helpSubject = document.getElementById('help-subject').value;

            // Inbox card rendering push assignment block
            let currentNotifications = JSON.parse(localStorage.getItem('portal_notifications') || '[]');
            currentNotifications.push({
                id: Date.now(),
                userId: "guest_user",
                title: "Help Ticket Opened",
                message: `Ticket item <strong>"${helpSubject}"</strong> generated. Support agents are evaluating your stack track code. Status: <span class="text-amber-400 font-medium">PENDING</span>.`,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('portal_notifications', JSON.stringify(currentNotifications));

            // Set custom parameters inside storage maps
            localStorage.setItem('toast_title', 'Help Ticket Opened!');
            localStorage.setItem('toast_desc', 'Your technical support request has been dispatched to our development leads.');
            localStorage.setItem('show_submit_toast', 'true');

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1200);
        }
    </script>
</body>
</html>
