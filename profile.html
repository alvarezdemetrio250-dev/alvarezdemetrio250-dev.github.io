<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile - Alvarez - Roman Heritage Equestrian</title>
    <link rel="icon" href="images/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        html, body {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #141612;
            color: white;
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }
        .page-wrapper { display: flex; flex-direction: column; min-height: 100vh; width: 100%; overflow-x: hidden; }

        /* NAVBAR */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #1e1e2f; padding: 10px 20px; color: white;
            position: relative; z-index: 100;
        }
        .navbar-left { display: flex; align-items: center; flex: 1; }
        .navbar-left img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; border: 2px solid #c5a059; }
        .navbar-left a { color: white; text-decoration: none; }
        .navbar-left span { font-size: 1.2rem; font-weight: bold; font-family: 'Playfair Display', serif; }

        /* HAMBURGER TOGGLE */
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

        .navbar-right { display: flex; align-items: center; cursor: pointer; position: relative; }
        #dropdownMenu {
            display: none; position: absolute; right: 0; top: 45px;
            background: #1e1e2f; padding: 10px; border-radius: 8px; z-index: 999;
            border: 1px solid rgba(197, 160, 89, 0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #dropdownMenu div { padding: 10px 15px; white-space: nowrap; transition: 0.2s; }
        #dropdownMenu div:hover { background: #c5a059; color: #141612; border-radius: 4px; }

        .sub-navbar {
            background-color: #232333; padding: 15px;
            display: flex; justify-content: center; gap: 20px; border-bottom: 2px solid #c5a059;
            transition: max-height 0.3s ease;
        }
        .sub-navbar a {
            background: #4a3b32; color: #fdfaf6; text-decoration: none;
            padding: 8px 20px; border-radius: 6px; transition: 0.3s; font-size: 0.95rem;
        }
        .sub-navbar a:hover { background: #c5a059; color: #141612; }

        /* PROFILE */
        .profile-container {
            max-width: 900px; margin: 40px auto; padding: 40px;
            background: rgba(30, 30, 47, 0.4); border-radius: 15px;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
        .profile-header { display: flex; align-items: center; gap: 30px; padding-bottom: 30px; border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #c5a059; object-fit: cover; }
        .profile-info h1 { font-family: 'Playfair Display', serif; color: #c5a059; margin: 0; font-size: 2.2rem; }
        .profile-info p { margin: 5px 0; color: #b5aba1; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card i { color: #c5a059; font-size: 1.5rem; margin-bottom: 10px; }

        .edit-btn { background: transparent; color: #c5a059; border: 1px solid #c5a059; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .edit-btn:hover { background: #c5a059; color: #141612; }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1e1e2f; margin: 10% auto; padding: 30px;
            width: 85%; max-width: 400px; border-radius: 15px; border: 1px solid #c5a059;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #b5aba1; font-size: 0.85rem; }
        .form-group input { width: 100%; padding: 12px; background: #2e2e40; border: 1px solid #4a3b32; color: white; border-radius: 5px; box-sizing: border-box; }
        
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .save-btn { background: #c5a059; color: #141612; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .cancel-btn { background: transparent; color: #888; border: none; cursor: pointer; padding: 10px; }

        footer { background: #1e1e2f; padding: 40px 20px; margin-top: auto; border-top: 2px solid #c5a059; text-align: center; }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .navbar { padding: 10px 15px; }
            .navbar-left span { font-size: 1rem; }
            .menu-toggle { display: block; margin-left: 15px; }
            
            .sub-navbar { 
                display: none; 
                flex-direction: column; 
                position: absolute; top: 60px; left: 0; width: 100%; 
                background: #1e1e2f; z-index: 90; gap: 0; padding: 0;
                border-bottom: 2px solid #c5a059;
            }
            .sub-navbar.active { display: flex; }
            .sub-navbar a { border-radius: 0; width: 100%; text-align: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

            .profile-container { margin: 20px; padding: 25px; }
            .profile-header { flex-direction: column; text-align: center; gap: 15px; }
            .profile-pic { width: 100px; height: 100px; }
            .profile-info h1 { font-size: 1.8rem; }
            
            .stats-grid { grid-template-columns: 1fr; gap: 15px; }
            
            .modal-content { margin: 20% auto; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="navbar">
        <div class="navbar-left">
            <img src="images/logo.png" alt="Logo">
            <a href="dashboard.html"><span>Alvarez Equestrian</span></a>
        </div>
        <div class="navbar-right">
            <div id="userMenu" style="display: flex; align-items: center;">
                <i class="fas fa-user"></i>
                <span id="usernameDisplay" style="margin-left: 8px; font-size: 0.9rem;">Loading...</span>
            </div>
            <div id="dropdownMenu">
                <div onclick="location.href='profile.html'">My Profile</div>
                <div onclick="logout()">Logout</div>
            </div>
            <button class="menu-toggle" onclick="toggleNav()"><i class="fa-solid fa-bars"></i></button>
        </div>
    </div>

    <div class="sub-navbar" id="subNavbar">
        <a href="dashboard.html">Home</a>
        <a href="memberships.html">Memberships</a>
        <a href="contact.html">Contact</a>
    </div>

    <div class="profile-container">
        <div class="profile-header">
            <img src="images/logo.png" class="profile-pic" id="profileDisplayPic" alt="User">
            <div class="profile-info">
                <h1 id="fullName">User Name</h1>
                <p id="userEmail">email@example.com</p>
                <button class="edit-btn" onclick="openEditModal()">Edit Profile</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-horse"></i>
                <h3>Horses</h3>
                <p id="horseCount">0 Enrolled</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-crown"></i>
                <h3>Level</h3>
                <p id="membershipType">Basic Access</p>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family: 'Playfair Display'; color: #c5a059; margin-top: 0;">Edit Profile</h2>
            
            <div class="form-group">
                <label>Profile Image</label>
                <input type="file" id="editPicFile" accept="image/*">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="editFullName">
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="editUsername">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="editEmail">
            </div>

            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="copyright">&copy; 2026 Alvarez - Roman Heritage Equestrian.</div>
    </footer>
</div>

<script>
    const API_URL = "https://login-backend-ny6x.onrender.com";

    function toggleNav() {
        document.getElementById("subNavbar").classList.toggle("active");
    }

    function openEditModal() {
        if(localStorage.getItem("guest") === "true") {
            alert("Guests cannot edit profiles.");
            return;
        }
        document.getElementById("editFullName").value = document.getElementById("fullName").innerText;
        document.getElementById("editEmail").value = document.getElementById("userEmail").innerText;
        document.getElementById("editUsername").value = document.getElementById("usernameDisplay").innerText;
        document.getElementById("editModal").style.display = "block";
    }

    function closeEditModal() {
        document.getElementById("editModal").style.display = "none";
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function saveProfile() {
        const token = localStorage.getItem("token");
        const saveBtn = document.getElementById("saveBtn");
        
        const newName = document.getElementById("editFullName").value;
        const newUsername = document.getElementById("editUsername").value;
        const newEmail = document.getElementById("editEmail").value;
        const picFile = document.getElementById("editPicFile").files[0];

        saveBtn.innerText = "Saving...";
        saveBtn.disabled = true;

        let profilePicData = document.getElementById("profileDisplayPic").src;

        try {
            if (picFile) {
                profilePicData = await fileToBase64(picFile);
            }

            const res = await fetch(`${API_URL}/update-profile`, {
                method: 'PUT',
                headers: { 
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    fullName: newName, 
                    username: newUsername,
                    email: newEmail, 
                    profilePic: profilePicData 
                })
            });

            if (res.ok) {
                const updatedUser = await res.json();
                document.getElementById("fullName").innerText = updatedUser.fullName;
                document.getElementById("userEmail").innerText = updatedUser.email;
                document.getElementById("usernameDisplay").innerText = updatedUser.username || updatedUser.fullName;
                if (updatedUser.profilePic) {
                    document.getElementById("profileDisplayPic").src = updatedUser.profilePic;
                }
                closeEditModal();
                alert("Profile Saved!");
            } else {
                alert("Update failed on server.");
            }
        } catch (err) {
            console.error(err);
            alert("Error connecting to server.");
        } finally {
            saveBtn.innerText = "Save Changes";
            saveBtn.disabled = false;
        }
    }

    async function loadUser() {
        const token = localStorage.getItem("token");
        const isGuest = localStorage.getItem("guest");
        const dd = document.getElementById("dropdownMenu");

        document.getElementById("userMenu").onclick = (e) => {
            e.stopPropagation();
            dd.style.display = dd.style.display === "block" ? "none" : "block";
        };
        
        window.onclick = () => { dd.style.display = "none"; };

        if (isGuest === "true") {
            document.getElementById("usernameDisplay").innerText = "Guest";
            document.getElementById("fullName").innerText = "Guest User";
            document.getElementById("userEmail").innerText = "Guest Mode";
            return;
        }

        if (!token) {
            window.location.href = "index.html";
            return;
        }

        try {
            const res = await fetch(`${API_URL}/me`, {
                headers: { "Authorization": "Bearer " + token }
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById("usernameDisplay").innerText = data.username || data.fullName;
                document.getElementById("fullName").innerText = data.fullName;
                document.getElementById("userEmail").innerText = data.email;
                
                if (data.profilePic && data.profilePic.startsWith("data:image")) {
                    document.getElementById("profileDisplayPic").src = data.profilePic;
                }
            } else {
                logout();
            }
        } catch (err) {
            console.error("Load Error:", err);
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "index.html";
    }

    loadUser();
</script>

</body>
</html>
