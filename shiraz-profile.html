<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiraz - Profile - Alvarez Equestrian</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Shared Styles */
        body { background: #141612; color: white; font-family: 'Roboto', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        
        /* Header Section */
        .profile-header { text-align: center; margin-bottom: 60px; }
        .profile-header h1 { font-family: 'Playfair Display', serif; color: #c5a059; font-size: 4rem; margin: 0; }
        .profile-header p { font-size: 1.4rem; color: #b5aba1; font-weight: 300; }

        /* Content Sections */
        .section-title { font-family: 'Playfair Display', serif; color: #c5a059; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 10px; margin-bottom: 30px; font-size: 2rem; }
        
        /* Videos */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .video-card { background: #1e1e2f; border-radius: 8px; overflow: hidden; border: 1px solid rgba(197, 160, 89, 0.2); }
        .video-placeholder { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; }

        /* Gallery */
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-bottom: 60px; }
        .gallery-img { width: 100%; height: 250px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(197, 160, 89, 0.2); transition: 0.3s; }
        .gallery-img:hover { border-color: #c5a059; transform: scale(1.02); }

        /* Final Action */
        .contact-section { text-align: center; padding: 40px; background: #1e1e2f; border-radius: 12px; border: 1px solid #c5a059; }
        .final-btn { display: inline-block; padding: 15px 50px; background: #c5a059; color: #141612; text-decoration: none; font-weight: bold; border-radius: 6px; font-size: 1.2rem; transition: 0.3s; }
        .final-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(197, 160, 89, 0.3); }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .profile-header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-header">
            <h1>Shiraz</h1>
            <p>An elegant Azteca stallion with world-class temperament and refined movement.</p>
        </div>

        <h2 class="section-title">Performance Videos</h2>
        <div class="video-grid">
            <div class="video-card">
                <div class="video-placeholder"><i class="fas fa-play fa-3x" style="color:#c5a059"></i></div>
                <p style="padding: 15px; margin:0;">Dressage Showcase - Fall 2025</p>
            </div>
            <div class="video-card">
                <div class="video-placeholder"><i class="fas fa-play fa-3x" style="color:#c5a059"></i></div>
                <p style="padding: 15px; margin:0;">Liberty Work Training</p>
            </div>
        </div>

        <h2 class="section-title">Photo Gallery</h2>
        <div class="image-gallery">
            <img src="images/shiraz1.jpg" class="gallery-img" alt="Shiraz profile">
            <img src="images/shiraz2.jpg" class="gallery-img" alt="Shiraz action">
            <img src="images/shiraz3.jpg" class="gallery-img" alt="Shiraz close up">
            <img src="images/shiraz4.jpg" class="gallery-img" alt="Shiraz stall">
        </div>

        <div class="contact-section">
            <h3 style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-top: 0;">Interested in Shiraz?</h3>
            <p style="color: #b5aba1; margin-bottom: 25px;">Schedule a viewing or request a full vetting report.</p>
            <a href="contact.html" class="final-btn">Contact Us</a>
        </div>
    </div>

    </body>
</html>
