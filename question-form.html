<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Community Question</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #1a1c1e; }
        .dark-card { background-color: #2f3136; }
        .dark-input { background-color: #202225; border-color: #2f3136; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-center items-center px-4">

    <main class="w-full max-w-2xl py-10">
        <a href="dashboard.html" class="text-sm text-gray-400 hover:text-white mb-4 inline-flex items-center">&larr; Back to Dashboard</a>
        <div class="dark-card p-8 rounded-xl border border-gray-800 shadow-xl">
            <h2 class="text-2xl font-bold text-white mb-2">Ask the Community</h2>
            <p class="text-gray-400 text-sm mb-6">Have a general question regarding upcoming schedules, applications, or rule sets?</p>
            
            <form onsubmit="handleQuestionSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Your Question</label>
                    <textarea id="question-text" rows="4" placeholder="Type your open question cleanly here..." required class="w-full dark-input rounded-md bg-[#202225] border border-gray-700 p-2.5 text-white focus:outline-none focus:border-blue-500"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Category Select</label>
                    <select id="question-cat" required class="w-full dark-input rounded-md bg-[#202225] border border-gray-700 p-2.5 text-white focus:outline-none focus:border-blue-500">
                        <option value="" disabled selected>Choose a matching category...</option>
                        <option value="General">General Inquiries</option>
                        <option value="Policy/Rules">Policy & Group Rules</option>
                        <option value="Schedules">Schedules & Deadlines</option>
                    </select>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white p-3 rounded-md font-semibold transition mt-2 shadow-lg flex items-center justify-center space-x-2">
                    <span id="btn-text">Post Question</span>
                    <div id="btn-spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>
        </div>
    </main>

    <script>
        function handleQuestionSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');

            btn.disabled = true;
            btnText.innerText = "Posting to Hub...";
            btnSpinner.classList.remove('hidden');

            setTimeout(() => {
                localStorage.setItem('show_submit_toast', 'true');
                window.location.href = 'dashboard.html';
            }, 1200);
        }
    </script>
</body>
</html>
